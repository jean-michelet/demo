name: Fastify Official Demo CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20, 22]  

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        
    - name: Install dependencies
      run: npm i --ignore-scripts
      
    - name: Lint Code
      run: npm run format
      
    - name: Test
      run: npm test
    
    # Test that the server doesn't crash
    - name: Start server
      run: npm run start & sleep 5; kill $!
    - name: Run development server
      run: npm run dev & sleep 5; kill $!
